<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>Mapa de Carreira</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700,900&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
	<style>
		body { background-color: #121212; color: #e0e0e0; font-family: 'Roboto', sans-serif; }
		.resume-header { background-color: #1a1a1a; border-bottom: 3px solid #6d28d9; }
		.bg-primary { background-color: #6d28d9 !important; }
		.text-link { color: #a78bfa; text-decoration: none; }
		.text-link:hover { text-decoration: underline; }
		.profile-picture { height: 220px; object-fit: cover; width: 220px; border: 3px solid #6d28d9; }
		.resume-wrapper-inner { max-width: 1000px; margin: 0 auto; background: #1e1e1e; }
		.resume-section-title { color: #a78bfa; border-bottom: 2px solid #2d2d2d; font-size: 1.5rem; }
		.progress { background-color: #2d2d2d; }
		
		/* Estilo para a lista de contatos vertical */
		.contact-list-vertical li { margin-bottom: 0.5rem; }
		.contact-list-vertical a { color: #a78bfa; text-decoration: underline; font-size: 1rem; }
		.contact-list-vertical a:hover { color: #c084fc; }
		
		/* Estilização das Badges de Roadmap */
		.badge-roadmap { background-color: #374151; color: #e5e7eb; padding: 0.4rem 0.6rem; font-size: 0.8rem; border-radius: 4px; font-weight: 500; }
	</style>
</head>
<body>
	<header class="resume-header pt-4" role="banner">
		<div class="resume-wrapper-inner p-4 shadow-lg">
			<div class="row">
				<div class="col-md-auto text-center text-md-start">
					<!-- Ajustado para ler o arquivo exatamente com a extensão profile.png.jpeg -->
					<img id="profile-photo" class="picture profile-picture rounded-circle mb-3 mb-md-0" src="assets/images/profile.png.jpeg" alt="Foto de Perfil">
				</div>
				<div class="col text-start ps-md-4">
					<h1 id="profile-name" class="name mt-0 mb-1 text-white text-uppercase fw-bold" style="font-size: 2.5rem; letter-spacing: 1px;">Paulo Henrique Queiroz Vieira</h1>
					<p id="profile-headline" class="title mb-3 text-white-50" style="font-size: 1.25rem;"></p>
					
					<!-- Lista de contatos vertical -->
					<ul id="contact-list" class="list-unstyled contact-list-vertical"></ul>
				</div>
			</div>
		</div>
	</header>

	<main id="conteudo-principal" class="container my-4">
		<div class="resume-wrapper-inner p-5 shadow-lg">
			<section id="perfil" class="mb-5">
				<h2 class="resume-section-title text-uppercase fw-bold pb-2 mb-4">Prazer em conhecer</h2>
				<p id="profile-summary" class="mb-4" style="font-size: 1.05rem; line-height: 1.6; color: #9ca3af;"></p>
				<!-- Botão de Download de Currículo -->
				<a id="cv-link" class="btn btn-secondary border-0 px-3 py-2" style="background-color: #4c1d95; color: #fff; font-weight: 500;" href="#" target="_blank">Baixar currículo em PDF</a>
			</section>

			<div class="row">
				<div class="col-lg-8">
					<section id="mapa-carreira" class="mb-5">
						<h2 class="resume-section-title text-uppercase fw-bold pb-2 mb-4">Mapa de Carreira</h2>
						<div id="career-timeline" class="position-relative ps-3" style="border-left: 2px solid #374151;"></div>
					</section>
				</div>

				<aside class="col-lg-4">
					<section id="habilidades" class="mb-5">
						<h2 class="resume-section-title text-uppercase fw-bold pb-2 mb-3">Soft e hard skills</h2>
						<p class="text-muted small">Afinidade com as seguintes tecnologias e competências:</p>
						<div id="skill-groups"></div>
						<div class="mt-4">
							<h4 class="fw-bold h6 text-white">Outras competências</h4>
							<ul id="other-skills" class="list-inline mt-2"></ul>
						</div>
					</section>

					<section id="idiomas" class="mb-5">
						<h2 class="resume-section-title text-uppercase fw-bold pb-2 mb-3">Idiomas</h2>
						<ul id="language-list" class="list-unstyled" style="font-size: 1.05rem;"></ul>
					</section>
				</aside>
			</div>
		</div>
	</main>
	<script src="assets/js/carreira-json.js" defer></script>
</body>
</html>
